[workspace]
resolver = "2"
members = ["cdn-proto", "cdn-broker", "cdn-marshal", "cdn-client"]

package.description = "The PushCDN is a distributed, scalable, and fault-tolerant pub/sub messaging system"

[workspace.dependencies]
tokio = { version = "1.35.1", default-features = false, features = [
    "test-util",
    "macros",
    "rt-multi-thread",
] }
jf-primitives = { git = "https://github.com/EspressoSystems/jellyfish.git", tag = "0.4.2" }
rand = "0.8.5"
tracing = { version = "0.1.40", default-features = false }
tracing-subscriber = { version = "0.3.18", default-features = false, features = [
    "fmt",
    "ansi"
] }
clap = { version = "4.4.18", default-features = false, features = [
    "std",
    "derive",
] }
prometheus = { version = "0.13.3", default-features = false }
lazy_static = "1.4.0"
derive_builder = "0.13.1"
async-std = { version = "1.12.0", default-features = false, features = ["tokio1", "attributes"] }
rkyv = { version = "0.7.44", features = ["validation"] }
derivative = "2.2.0"
parking_lot = "0.12.1"

# Dev dependencies (can't be defined explicitly in the workspace)
# TODO: figure out if this actually builds on non-test targets
criterion = { version = "0.5.1", features = ["html_reports", "async_tokio"] }
pprof = { version = "0.13.0", features = ["flamegraph", "criterion"] }
